<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPC Search Database</title>
    <!-- We use PapaParse to easily read the Google Sheet CSV format -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }
        .search-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 20px;
            text-align: left;
            width: 100%;
        }
        .record-card {
            background: #e9ecef;
            padding: 15px;
            border-radius: 4px;
            margin-top: 10px;
        }
        .record-card p {
            margin: 5px 0;
            line-height: 1.4;
        }
        .record-card strong {
            display: inline-block;
            width: 120px;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <h2>Music Release UPC Search</h2>
        <input type="text" id="upcInput" placeholder="Enter UPC here..." onkeypress="handleKeyPress(event)">
        <br>
        <button onclick="searchUPC()">Search</button>

        <div id="result"></div>
    </div>

    <script>
        // Your Google Sheet Details
        const sheetId = '1g4DBoGER92FVA6ljLZTrTRuV2vuh-aUoA7ynj8H53x0';
        const sheetName = 'MASTER';
        // This URL tells Google to export that specific sheet as a CSV file
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                searchUPC();
            }
        }

        function searchUPC() {
            const upcVal = document.getElementById('upcInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!upcVal) {
                resultDiv.innerHTML = '<p style="color:red;">Please enter a UPC.</p>';
                return;
            }

            resultDiv.innerHTML = '<p class="loading">Searching database...</p>';

            // Fetch and parse the Google Sheet CSV
            Papa.parse(csvUrl, {
                download: true,
                header: true, // Uses the first row (your headers) as object keys
                complete: function(results) {
                    const data = results.data;
                    
                    // Search for the exact UPC match in the 'UPC' column
                    const record = data.find(row => row['UPC'] === upcVal);

                    if (record) {
                        displayRecord(record, resultDiv);
                    } else {
                        resultDiv.innerHTML = '<p style="color:red;">UPC not found in the MASTER database.</p>';
                    }
                },
                error: function(err) {
                    resultDiv.innerHTML = '<p style="color:red;">Error fetching data. Check if your Google Sheet is set to "Anyone with link can view".</p>';
                }
            });
        }

        function displayRecord(record, container) {
            let html = '<div class="record-card">';
            html += `<p><strong>Artist:</strong> ${record['Artist'] || 'N/A'}</p>`;
            html += `<p><strong>Title:</strong> ${record['Title'] || 'N/A'}</p>`;
            html += `<p><strong>Release Date:</strong> ${record['Release Date'] || 'N/A'}</p>`;
            html += `<p><strong>Label:</strong> ${record['Label'] || 'N/A'}</p>`;
            html += `<p><strong>Partners:</strong> ${record['Partners'] || 'N/A'}</p>`;
            
            // Format Spotify Link
            if (record['Spotify']) {
                let spotifyUrl = record['Spotify'];
                // Check if it's a URI format (e.g., spotify:album:xyz)
                if (spotifyUrl.startsWith('spotify:')) {
                    // Replaces 'spotify:' with the web domain, and any remaining ':' with '/'
                    spotifyUrl = spotifyUrl.replace('spotify:', 'https://open.spotify.com/').replace(/:/g, '/');
                }
                html += `<p><strong>Spotify:</strong> <a href="${spotifyUrl}" target="_blank">Spotify pre-release link</a></p>`;
            }

            // Format Apple Link
            if (record['Apple']) {
                let appleUrl = record['Apple'];
                // Check if it's just an ID and not already a link
                if (!appleUrl.startsWith('http')) {
                    appleUrl = `https://music.apple.com/gb/album/${appleUrl}`;
                }
                html += `<p><strong>Apple:</strong> <a href="${appleUrl}" target="_blank">Apple pre-release link</a></p>`;
            }

            // Format YouTube Link
            if (record['YouTube']) {
                html += `<p><strong>YouTube:</strong> <a href="${record['YouTube']}" target="_blank">YouTube pre-release link</a></p>`;
            }

            // Format Amazon Link
            if (record['Amazon']) {
                html += `<p><strong>Amazon:</strong> <a href="${record['Amazon']}" target="_blank">Amazon pre-release link</a></p>`;
            }

            // Format Beatport Link
            if (record['Beatport']) {
                html += `<p><strong>Beatport:</strong> <a href="${record['Beatport']}" target="_blank">Beatport pre-release link</a></p>`;
            }

            // Format Warnings
            if (record['WARNINGS']) {
                html += `<p style="color:red;"><strong>Warnings:</strong> ${record['WARNINGS']}</p>`;
            }
            
            html += '</div>';
            container.innerHTML = html;
        }
    </script>
</body>
</html>
