<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPC Search</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: Calibri, 'Segoe UI', Arial, sans-serif;
            background-color: #B39DDB;
            color: #4A148C;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-bottom: 60px;
            box-sizing: border-box;
        }
        
        .search-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 35vh; 
            margin-bottom: 20px;
            transition: margin-top 0.4s ease-out;
        }

        .search-wrapper.active {
            margin-top: 40px; 
        }

        .pill-search {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80%;
            max-width: 600px;
            height: 50px;
            border-radius: 25px;
            background-color: #EDE7F6;
            box-shadow: 7px 7px 15px rgba(0, 0, 0, 0.1), -7px -7px 15px rgba(255, 255, 255, 0.5);
            padding: 0;
            overflow: hidden;
            border: none;
        }

        input#upcInput {
            flex-grow: 1;
            height: 100%;
            border: none;
            background: transparent;
            outline: none;
            padding: 0 20px;
            font-size: 18px;
            color: #4A148C;
            letter-spacing: 0.5px;
        }

        input#upcInput::placeholder {
            color: #9E9E9E;
            font-size: 16px;
        }

        .search-icon-btn {
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            cursor: pointer;
            height: 100%;
            display: flex;
            align-items: center;
            padding-right: 15px;
        }

        .search-icon-btn svg {
            width: 24px;
            height: 24px;
            stroke: #7E57C2;
            stroke-width: 2;
            fill: none;
            transition: stroke 0.2s;
        }
        
        .search-icon-btn:hover svg {
            stroke: #4A148C;
        }

        #result {
            width: 100%;
            max-width: 600px;
            text-align: left;
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        #result.visible {
            opacity: 1;
        }

        details.record-card {
            background: #F3E5F5;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.05);
            color: #4A148C;
            margin-bottom: 15px;
        }

        .record-summary {
            cursor: pointer;
            font-weight: bold;
            color: #6A1B9A;
            outline: none;
            list-style: none; 
            font-size: 16px;
        }
        
        .record-summary::-webkit-details-marker {
            display: none;
        }

        .record-summary::before {
            content: '▶';
            display: inline-block;
            margin-right: 10px;
            font-size: 12px;
            color: #9575CD;
            transition: transform 0.2s ease;
        }

        details[open] > .record-summary::before {
            transform: rotate(90deg);
        }

        .record-expanded-content {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #E1BEE7;
        }

        /* ARTWORK STYLES */
        .artwork-container {
            text-align: center;
            margin-bottom: 15px;
        }

        .artwork-img {
            width: 100%;
            max-width: 250px;
            border-radius: 8px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .record-card p {
            margin: 5px 0;
            line-height: 1.4;
        }

        .record-card strong {
            display: inline-block;
            width: 160px;
            color: #6A1B9A;
        }

        .label-link {
            color: #7E57C2;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px dashed #7E57C2;
            transition: color 0.2s, border-bottom 0.2s;
        }

        .label-link:hover {
            color: #4A148C;
            border-bottom: 1px solid #4A148C;
        }

        .loading {
            color: #9575CD;
            font-style: italic;
            text-align: center;
            margin-top: 10px;
        }
        
        .results-header {
            text-align: center;
            color: #4A148C;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        details.tracks-details {
            margin-top: 15px;
            padding-top: 10px;
        }
        
        .tracklist {
            list-style-type: none;
            padding-left: 0;
            margin-top: 15px;
            margin-bottom: 0;
        }

        .tracklist li {
            margin-bottom: 8px;
            background: #EDE7F6;
            padding: 8px 12px;
            border-radius: 4px;
        }

        .tracklist-uri {
            font-size: 14px;
            color: #7E57C2;
            word-break: break-all;
            display: block;
            margin-top: 2px;
        }

        hr {
            border: 0;
            border-top: 1px solid #E1BEE7;
            margin: 15px 0;
        }

    </style>
</head>
<body>

    <div class="search-wrapper" id="searchWrapper">
        <div class="pill-search">
            <input type="text" id="upcInput" placeholder="Enter UPC..." onkeypress="handleKeyPress(event)">
            <button class="search-icon-btn" onclick="searchUPC()">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </div>
    </div>

    <div id="result"></div>

    <script>
        const sheetId = '1g4DBoGER92FVA6ljLZTrTRuV2vuh-aUoA7ynj8H53x0';
        
        function fetchSheetCSV(sheetName) {
            return new Promise((resolve, reject) => {
                const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
                Papa.parse(url, {
                    download: true,
                    header: true,
                    complete: function(results) {
                        resolve(results.data);
                    },
                    error: function(err) {
                        reject(err);
                    }
                });
            });
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                searchUPC();
            }
        }

        function triggerSearchAnimation() {
            document.getElementById('searchWrapper').classList.add('active');
        }

        function checkAppleLiveStatus(record) {
            if (!record['Apple']) return;

            let appleId = record['Apple'];
            if (appleId.startsWith('http')) {
                appleId = appleId.split('/').pop();
            }

            const upc = record['UPC'] || appleId;
            const artworkContainerId = `artwork-${upc}`;
            const appleTracksContainerId = `apple-tracks-${upc}`;
            
            fetch(`https://itunes.apple.com/lookup?id=${appleId}&entity=song`)
                .then(res => res.json())
                .then(data => {
                    if (data.resultCount > 0) {
                        const albumData = data.results.find(item => item.wrapperType === 'collection');
                        const artworkContainer = document.getElementById(artworkContainerId);
                        
                        if (albumData && artworkContainer) {
                            let artworkUrl = albumData.artworkUrl100.replace('100x100bb', '600x600bb');
                            artworkContainer.innerHTML = `<img src="${artworkUrl}" alt="Album Artwork" class="artwork-img">`;
                        }

                        const tracksData = data.results.filter(item => item.wrapperType === 'track');
                        const tracksContainer = document.getElementById(appleTracksContainerId);
                        
                        if (tracksData.length > 0 && tracksContainer) {
                            tracksData.sort((a, b) => a.trackNumber - b.trackNumber);
                            
                            let html = '<hr>';
                            html += `<details class="tracks-details">`;
                            html += `<summary class="record-summary" style="color: #4A148C;">View Apple Music Track IDs (${tracksData.length})</summary>`;
                            html += '<ul class="tracklist">';
                            
                            tracksData.forEach(track => {
                                html += `<li>
                                            <strong>${track.trackNumber}. ${track.trackName}</strong>
                                            <span class="tracklist-uri">${track.trackId}</span>
                                         </li>`;
                            });
                            
                            html += '</ul></details>';
                            tracksContainer.innerHTML = html;
                        }
                    }
                })
                .catch(e => console.log('Apple data not found or release not live yet.', e));
        }

        function searchUPC() {
            const upcVal = document.getElementById('upcInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '';
            resultDiv.classList.remove('visible');

            if (!upcVal) {
                resultDiv.innerHTML = '<p style="color:#B71C1C; text-align:center; margin-top:10px;">Please enter a UPC.</p>';
                resultDiv.classList.add('visible');
                return;
            }

            resultDiv.innerHTML = '<p class="loading">Searching database and fetching tracks...</p>';
            resultDiv.classList.add('visible');

            Promise.all([
                fetchSheetCSV('MASTER'),
                fetchSheetCSV('Track URI filtered')
            ]).then(([masterData, tracksData]) => {
                const record = masterData.find(row => row['UPC'] === upcVal);
                resultDiv.innerHTML = '';

                if (record) {
                    triggerSearchAnimation();
                    resultDiv.innerHTML = buildRecordCard(record, true, tracksData);
                    checkAppleLiveStatus(record);
                } else {
                    resultDiv.innerHTML = '<p style="color:#B71C1C; text-align:center; margin-top:10px;">UPC not found in the MASTER database.</p>';
                }
            }).catch(err => {
                resultDiv.innerHTML = '<p style="color:#B71C1C; text-align:center; margin-top:10px;">Error fetching data. Check sheet access.</p>';
            });
        }

        function searchLabel(labelName) {
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = `<p class="loading">Finding all releases and tracks for ${labelName}...</p>`;
            triggerSearchAnimation();

            Promise.all([
                fetchSheetCSV('MASTER'),
                fetchSheetCSV('Track URI filtered')
            ]).then(([masterData, tracksData]) => {
                const records = masterData.filter(row => row['Label'] === labelName);
                resultDiv.innerHTML = '';

                if (records.length > 0) {
                    let html = `<div class="results-header">Upcoming Releases for ${labelName}</div>`;
                    records.forEach(record => {
                        html += buildRecordCard(record, false, tracksData);
                    });
                    resultDiv.innerHTML = html;
                    
                    records.forEach(record => checkAppleLiveStatus(record));
                } else {
                    resultDiv.innerHTML = `<p style="color:#B71C1C; text-align:center; margin-top:10px;">No other releases found for ${labelName}.</p>`;
                }
            }).catch(err => {
                resultDiv.innerHTML = '<p style="color:#B71C1C; text-align:center; margin-top:10px;">Error fetching data. Check sheet access.</p>';
            });
        }

        function buildRecordCard(record, isExpanded, allTracksData) {
            let openAttr = isExpanded ? 'open' : '';
            let html = `<details class="record-card" ${openAttr}>`;
            
            let upc = record['UPC'] || 'N/A';
            let artist = record['Artist'] || 'N/A';
            let title = record['Title'] || 'N/A';
            let appleId = record['Apple'] || '';
            let recordId = upc !== 'N/A' ? upc : appleId;
            
            html += `<summary class="record-summary">${upc} / ${artist} / ${title}</summary>`;
            html += `<div class="record-expanded-content">`;
            
            html += `<div id="artwork-${recordId}" class="artwork-container"></div>`;
            
            html += `<p><strong>UPC:</strong> ${upc}</p>`;
            html += `<p><strong>Artist:</strong> ${artist}</p>`;
            html += `<p><strong>Title:</strong> ${title}</p>`;
            html += `<p><strong>Release Date:</strong> ${record['Release Date'] || 'N/A'}</p>`;
            
            if (record['Label']) {
                let safeLabel = record['Label'].replace(/'/g, "\\'");
                html += `<p><strong>Label:</strong> <a href="#" onclick="searchLabel('${safeLabel}'); return false;" class="label-link" title="Click to view all releases for this label">${record['Label']}</a></p>`;
            } else {
                html += `<p><strong>Label:</strong> N/A</p>`;
            }
            
            html += `<p><strong>Partners:</strong> ${record['Partners'] || 'N/A'}</p>`;

            // PREDICTED LINKFIRE LOGIC WITH MULTIPLE DOMAINS
            if (record['Label']) {
                let labelName = record['Label'].trim();
                
                // Map of labels to their specific Linkfire domain
                const linkfireDomains = {
                    'When Stars Align': 'whenstarsalign.lnk.to',
                    'Silver Lining Music': 'SilverLining.lnk.to',
                    'Golden Path Recordings': 'GoldenPathRecs.lnk.to',
                    'Golden Recordings': 'GoldenRecs.lnk.to'
                };

                if (linkfireDomains[labelName]) {
                    let rawTitle = record['Title'] || '';
                    // Strip out all spaces and non-alphanumeric characters
                    let safeTitlePath = rawTitle.replace(/[^a-zA-Z0-9]/g, '');
                    if (safeTitlePath) {
                        let baseDomain = linkfireDomains[labelName];
                        let predictedLink = `https://${baseDomain}/${safeTitlePath}`;
                        html += `<p><strong>Linkfire:</strong> <a href="${predictedLink}" target="_blank">${predictedLink}</a></p>`;
                    }
                }
            }
            
            if (allTracksData && upc !== 'N/A') {
                let albumTracks = allTracksData.filter(row => row['UPC'] === upc);
                if (albumTracks.length > 0) {
                    albumTracks.sort((a, b) => (parseInt(a['Track Number']) || 0) - (parseInt(b['Track Number']) || 0));
                    
                    html += '<hr>';
                    html += `<details class="tracks-details">`;
                    html += `<summary class="record-summary" style="color: #4A148C;">View Spotify Track URIs (${albumTracks.length})</summary>`;
                    html += '<ul class="tracklist">';
                    albumTracks.forEach(track => {
                        let trackNum = track['Track Number'] || '-';
                        let trackTitle = track['Track Title'] || 'Unknown Title';
                        let trackUri = track['Track URI'] || 'No URI available';
                        
                        html += `<li>
                                    <strong>${trackNum}. ${trackTitle}</strong>
                                    <span class="tracklist-uri">${trackUri}</span>
                                 </li>`;
                    });
                    html += '</ul></details>';
                }
            }

            // Placeholder for Apple Track IDs to be injected dynamically
            html += `<div id="apple-tracks-${recordId}"></div>`;

            html += '<hr>';

            if (record['Spotify']) {
                let spotifyUri = record['Spotify'];
                let spotifyUrl = spotifyUri;
                if (spotifyUri.startsWith('spotify:')) {
                    spotifyUrl = spotifyUri.replace('spotify:', 'https://open.spotify.com/').replace(/:/g, '/');
                }
                html += `<p><strong>Spotify Album URI:</strong> ${spotifyUri}</p>`;
                html += `<p><strong>Spotify:</strong> <a href="${spotifyUrl}" target="_blank">Pre-release link</a></p>`;
            }

            if (record['Apple']) {
                let appleId = record['Apple'];
                let appleUrl = appleId;
                if (!appleId.startsWith('http')) {
                    appleUrl = `https://music.apple.com/gb/album/${appleId}`;
                } else {
                    appleId = appleId.split('/').pop();
                }
                html += `<p><strong>Apple Album ID:</strong> ${appleId}</p>`;
                html += `<p><strong>Apple:</strong> <a href="${appleUrl}" target="_blank">Pre-release link</a></p>`;
            }

            if (record['YouTube']) {
                html += `<p><strong>YouTube:</strong> <a href="${record['YouTube']}" target="_blank">Pre-release link</a></p>`;
            }

            if (record['Amazon']) {
                let amazonUrl = record['Amazon'];
                let asin = "";
                if (amazonUrl.includes('/dp/')) {
                    asin = amazonUrl.split('/dp/')[1].split('/')[0];
                } else {
                    asin = amazonUrl.split('/').pop();
                }
                html += `<p><strong>Amazon Album ASIN:</strong> ${asin}</p>`;
                html += `<p><strong>Amazon:</strong> <a href="${amazonUrl}" target="_blank">Pre-release link</a></p>`;
            }

            if (record['Beatport']) {
                html += `<p><strong>Beatport:</strong> <a href="${record['Beatport']}" target="_blank">Pre-release link</a></p>`;
            }

            if (record['WARNINGS']) {
                html += '<hr>'; 
                html += `<p style="color:#B71C1C;"><strong>Warnings:</strong> ${record['WARNINGS']}</p>`;
            }
            
            html += '</div></details>';
            return html;
        }
    </script>
</body>
</html>
