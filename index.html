<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPC Search</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            /* Minimal Calibri font with fallbacks */
            font-family: Calibri, 'Segoe UI', Arial, sans-serif;
            /* Light purple background from reference image */
            background-color: #B39DDB;
            color: #4A148C;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Center everything vertically initially */
            height: 100vh; /* Full screen height */
            margin: 0;
            overflow: hidden; /* Prevent scrolling during main view */
        }
        
        /* The container for the pill search bar */
        .search-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 20px; /* Space for results */
            transition: margin-top 0.3s ease; /* Animate results coming in */
        }

        /* The minimalist, soft pill-shaped search bar */
        .pill-search {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80%; /* Takes most of the width */
            max-width: 600px; /* Caps the width like in reference */
            height: 50px; /* Pill height */
            border-radius: 25px; /* Perfect pill shape */
            /* Off-white background from image */
            background-color: #EDE7F6;
            /* Neumorphic soft UI shadows: soft dark and soft light */
            box-shadow: 7px 7px 15px rgba(0, 0, 0, 0.1), -7px -7px 15px rgba(255, 255, 255, 0.5);
            padding: 0;
            overflow: hidden;
            border: none;
        }

        /* Styling for the search input field within the pill */
        input#upcInput {
            flex-grow: 1; /* Input takes up the remaining space */
            height: 100%;
            border: none;
            background: transparent;
            outline: none; /* Remove blue focus border */
            padding: 0 20px; /* Internal text padding */
            font-size: 18px; /* Slightly larger for readability */
            color: #4A148C;
            letter-spacing: 0.5px;
        }

        /* Minimal placeholder text */
        input#upcInput::placeholder {
            color: #9E9E9E;
            font-size: 16px;
        }

        /* The clickable search icon SVG on the right */
        .search-icon-btn {
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            cursor: pointer;
            height: 100%;
            display: flex;
            align-items: center;
            padding-right: 15px; /* Icon distance from edge */
        }

        /* Basic SVG styles for the minimal search icon */
        .search-icon-btn svg {
            width: 24px;
            height: 24px;
            stroke: #7E57C2; /* Minimal purple icon color */
            stroke-width: 2;
            fill: none;
            transition: stroke 0.2s;
        }
        
        .search-icon-btn:hover svg {
            stroke: #4A148C;
        }

        /* Position results to appear below the search bar */
        #result {
            width: 100%;
            max-width: 600px;
            text-align: left;
            transition: opacity 0.3s ease, margin-top 0.3s ease;
            opacity: 0;
            margin-top: -20px; /* Start results up, animate down */
            padding-bottom: 40px; /* Space at the bottom so last card isn't cut off */
        }

        /* Show results, animate down and fade in */
        #result.visible {
            opacity: 1;
            margin-top: 0;
        }

        /* Record display styles, also minimal */
        .record-card {
            /* Slights softer result background */
            background: #F3E5F5;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.05);
            color: #4A148C;
            margin-bottom: 15px; /* Spacing between multiple cards */
        }

        .record-card p {
            margin: 5px 0;
            line-height: 1.4;
        }

        .record-card strong {
            display: inline-block;
            width: 160px; /* Clear label alignment */
            color: #6A1B9A;
        }

        .label-link {
            color: #7E57C2;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px dashed #7E57C2;
            transition: color 0.2s, border-bottom 0.2s;
        }

        .label-link:hover {
            color: #4A148C;
            border-bottom: 1px solid #4A148C;
        }

        .loading {
            color: #9575CD;
            font-style: italic;
            text-align: center;
            margin-top: 10px;
        }
        
        .results-header {
            text-align: center;
            color: #4A148C;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        hr {
            border: 0;
            border-top: 1px solid #E1BEE7;
            margin: 15px 0;
        }

    </style>
</head>
<body>

    <div class="search-wrapper">
        <div class="pill-search">
            <input type="text" id="upcInput" placeholder="Enter UPC..." onkeypress="handleKeyPress(event)">
            <button class="search-icon-btn" onclick="searchUPC()">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </div>
    </div>

    <div id="result"></div>

    <script>
        // Your Google Sheet Details
        const sheetId = '1g4DBoGER92FVA6ljLZTrTRuV2vuh-aUoA7ynj8H53x0';
        const sheetName = 'MASTER';
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                searchUPC();
            }
        }

        // Standard UPC Search
        function searchUPC() {
            const upcVal = document.getElementById('upcInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '';
            resultDiv.classList.remove('visible');

            if (!upcVal) {
                resultDiv.innerHTML = '<p style="color:#B71C1C; text-align:center; margin-top:10px;">Please enter a UPC.</p>';
                resultDiv.classList.add('visible');
                return;
            }

            resultDiv.innerHTML = '<p class="loading">Searching...</p>';
            resultDiv.classList.add('visible');

            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    const data = results.data;
                    const record = data.find(row => row['UPC'] === upcVal);

                    resultDiv.innerHTML = '';

                    if (record) {
                        document.querySelector('.search-wrapper').style.marginTop = '-100px'; 
                        document.body.style.overflow = 'auto'; 
                        
                        // Build and display single card
                        resultDiv.innerHTML = buildRecordCard(record);
                    } else {
                        resultDiv.innerHTML = '<p style="color:#B71C1C; text-align:center; margin-top:10px;">UPC not found in the MASTER database.</p>';
                    }
                },
                error: function(err) {
                    resultDiv.innerHTML = '<p style="color:#B71C1C; text-align:center; margin-top:10px;">Error fetching data. Check sheet access.</p>';
                }
            });
        }

        // New Label Search Function (Triggered by clicking the Label link)
        function searchLabel(labelName) {
            const resultDiv = document.getElementById('result');
            
            // Show loading state while transitioning to label view
            resultDiv.innerHTML = `<p class="loading">Finding all releases for ${labelName}...</p>`;
            
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    const data = results.data;
                    
                    // Find all rows where the Label matches the clicked label
                    const records = data.filter(row => row['Label'] === labelName);

                    resultDiv.innerHTML = '';

                    if (records.length > 0) {
                        // Add a subtle header so the user knows what they are looking at
                        let html = `<div class="results-header">Upcoming Releases for ${labelName}</div>`;
                        
                        // Build a card for each matching release and stack them
                        records.forEach(record => {
                            html += buildRecordCard(record);
                        });
                        
                        resultDiv.innerHTML = html;
                    } else {
                        resultDiv.innerHTML = `<p style="color:#B71C1C; text-align:center; margin-top:10px;">No other releases found for ${labelName}.</p>`;
                    }
                }
            });
        }

        // Helper function to build the HTML for a single release card
        function buildRecordCard(record) {
            let html = '<div class="record-card">';
            
            html += `<p><strong>UPC:</strong> ${record['UPC'] || 'N/A'}</p>`;
            html += `<p><strong>Artist:</strong> ${record['Artist'] || 'N/A'}</p>`;
            html += `<p><strong>Title:</strong> ${record['Title'] || 'N/A'}</p>`;
            html += `<p><strong>Release Date:</strong> ${record['Release Date'] || 'N/A'}</p>`;
            
            // Format Label as a Clickable Link
            if (record['Label']) {
                // Escape single quotes just in case a label name has one (e.g., "O'Reilly Records")
                let safeLabel = record['Label'].replace(/'/g, "\\'");
                html += `<p><strong>Label:</strong> <a href="#" onclick="searchLabel('${safeLabel}'); return false;" class="label-link" title="Click to view all releases for this label">${record['Label']}</a></p>`;
            } else {
                html += `<p><strong>Label:</strong> N/A</p>`;
            }
            
            html += `<p><strong>Partners:</strong> ${record['Partners'] || 'N/A'}</p>`;
            
            html += '<hr>';

            // Format Spotify
            if (record['Spotify']) {
                let spotifyUri = record['Spotify'];
                let spotifyUrl = spotifyUri;
                if (spotifyUri.startsWith('spotify:')) {
                    spotifyUrl = spotifyUri.replace('spotify:', 'https://open.spotify.com/').replace(/:/g, '/');
                }
                html += `<p><strong>Spotify Album URI:</strong> ${spotifyUri}</p>`;
                html += `<p><strong>Spotify:</strong> <a href="${spotifyUrl}" target="_blank">Pre-release link</a></p>`;
            }

            // Format Apple
            if (record['Apple']) {
                let appleId = record['Apple'];
                let appleUrl = appleId;
                if (!appleId.startsWith('http')) {
                    appleUrl = `https://music.apple.com/gb/album/${appleId}`;
                } else {
                    appleId = appleId.split('/').pop();
                }
                html += `<p><strong>Apple Album ID:</strong> ${appleId}</p>`;
                html += `<p><strong>Apple:</strong> <a href="${appleUrl}" target="_blank">Pre-release link</a></p>`;
            }

            // Format YouTube
            if (record['YouTube']) {
                html += `<p><strong>YouTube:</strong> <a href="${record['YouTube']}" target="_blank">Pre-release link</a></p>`;
            }

            // Format Amazon
            if (record['Amazon']) {
                let amazonUrl = record['Amazon'];
                let asin = "";
                if (amazonUrl.includes('/dp/')) {
                    asin = amazonUrl.split('/dp/')[1].split('/')[0];
                } else {
                    asin = amazonUrl.split('/').pop();
                }
                html += `<p><strong>Amazon Album ASIN:</strong> ${asin}</p>`;
                html += `<p><strong>Amazon:</strong> <a href="${amazonUrl}" target="_blank">Pre-release link</a></p>`;
            }

            // Format Beatport
            if (record['Beatport']) {
                html += `<p><strong>Beatport:</strong> <a href="${record['Beatport']}" target="_blank">Pre-release link</a></p>`;
            }

            // Format WARNINGS
            if (record['WARNINGS']) {
                html += '<hr>'; 
                html += `<p style="color:#B71C1C;"><strong>Warnings:</strong> ${record['WARNINGS']}</p>`;
            }
            
            html += '</div>';
            return html;
        }
    </script>
</body>
</html>
