<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPC Search</title>
    <!-- We use PapaParse to easily read the Google Sheet CSV format -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            /* Minimal Calibri font with fallbacks */
            font-family: Calibri, 'Segoe UI', Arial, sans-serif;
            background-color: #B39DDB;
            color: #4A148C;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        .search-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 20px;
            transition: margin-top 0.3s ease;
        }

        .pill-search {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80%;
            max-width: 600px;
            height: 50px;
            border-radius: 25px;
            background-color: #EDE7F6;
            box-shadow: 7px 7px 15px rgba(0, 0, 0, 0.1), -7px -7px 15px rgba(255, 255, 255, 0.5);
            padding: 0;
            overflow: hidden;
            border: none;
        }

        input#upcInput {
            flex-grow: 1;
            height: 100%;
            border: none;
            background: transparent;
            outline: none;
            padding: 0 20px;
            font-size: 18px;
            color: #4A148C;
            letter-spacing: 0.5px;
        }

        input#upcInput::placeholder {
            color: #9E9E9E;
            font-size: 16px;
        }

        .search-icon-btn {
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            cursor: pointer;
            height: 100%;
            display: flex;
            align-items: center;
            padding-right: 15px;
        }

        .search-icon-btn svg {
            width: 24px;
            height: 24px;
            stroke: #7E57C2;
            stroke-width: 2;
            fill: none;
            transition: stroke 0.2s;
        }
        
        .search-icon-btn:hover svg {
            stroke: #4A148C;
        }

        #result {
            width: 100%;
            max-width: 600px;
            text-align: left;
            transition: opacity 0.3s ease, margin-top 0.3s ease;
            opacity: 0;
            margin-top: -20px;
            padding-bottom: 40px;
        }

        #result.visible {
            opacity: 1;
            margin-top: 0;
        }

        /* Update to target the <details> tag */
        details.record-card {
            background: #F3E5F5;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.05);
            color: #4A148C;
            margin-bottom: 15px;
        }

        /* Styling for the collapsed header */
        .record-summary {
            cursor: pointer;
            font-weight: bold;
            color: #6A1B9A;
            outline: none;
            list-style: none; /* Removes default arrow in modern browsers */
            font-size: 16px;
        }
        
        /* Fallback to hide default arrow in webkit browsers */
        .record-summary::-webkit-details-marker {
            display: none;
        }

        /* Custom minimal arrow */
        .record-summary::before {
            content: '▶';
            display: inline-block;
            margin-right: 10px;
            font-size: 12px;
            color: #9575CD;
            transition: transform 0.2s ease;
        }

        /* Rotate arrow when open */
        details[open] .record-summary::before {
            transform: rotate(90deg);
        }

        /* Space inside the card when expanded */
        .record-expanded-content {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #E1BEE7;
        }

        .record-card p {
            margin: 5px 0;
            line-height: 1.4;
        }

        .record-card strong {
            display: inline-block;
            width: 160px;
            color: #6A1B9A;
        }

        .label-link {
            color: #7E57C2;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px dashed #7E57C2;
            transition: color 0.2s, border-bottom 0.2s;
        }

        .label-link:hover {
            color: #4A148C;
            border-bottom: 1px solid #4A148C;
        }

        .loading {
            color: #9575CD;
            font-style: italic;
            text-align: center;
            margin-top: 10px;
        }
        
        .results-header {
            text-align: center;
            color: #4A148C;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        hr {
            border: 0;
            border-top: 1px solid #E1BEE7;
            margin: 15px 0;
        }

    </style>
</head>
<body>

    <div class="search-wrapper">
        <div class="pill-search">
            <input type="text" id="upcInput" placeholder="Enter UPC..." onkeypress="handleKeyPress(event)">
            <button class="search-icon-btn" onclick="searchUPC()">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </div>
    </div>

    <div id="result"></div>

    <script>
        const sheetId = '1g4DBoGER92FVA6ljLZTrTRuV2vuh-aUoA7ynj8H53x0';
        const sheetName = 'MASTER';
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                searchUPC();
            }
        }

        function searchUPC() {
            const upcVal = document.getElementById('upcInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '';
            resultDiv.classList.remove('visible');

            if (!upcVal) {
                resultDiv.innerHTML = '<p style="color:#B71C1C; text-align:center; margin-top:10px;">Please enter a UPC.</p>';
                resultDiv.classList.add('visible');
                return;
            }

            resultDiv.innerHTML = '<p class="loading">Searching...</p>';
            resultDiv.classList.add('visible');

            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    const data = results.data;
                    const record = data.find(row => row['UPC'] === upcVal);

                    resultDiv.innerHTML = '';

                    if (record) {
                        document.querySelector('.search-wrapper').style.marginTop = '-100px'; 
                        document.body.style.overflow = 'auto'; 
                        
                        // Pass 'true' so the single UPC search is expanded by default
                        resultDiv.innerHTML = buildRecordCard(record, true);
                    } else {
                        resultDiv.innerHTML = '<p style="color:#B71C1C; text-align:center; margin-top:10px;">UPC not found in the MASTER database.</p>';
                    }
                },
                error: function(err) {
                    resultDiv.innerHTML = '<p style="color:#B71C1C; text-align:center; margin-top:10px;">Error fetching data. Check sheet access.</p>';
                }
            });
        }

        function searchLabel(labelName) {
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = `<p class="loading">Finding all releases for ${labelName}...</p>`;
            
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    const data = results.data;
                    const records = data.filter(row => row['Label'] === labelName);

                    resultDiv.innerHTML = '';

                    if (records.length > 0) {
                        let html = `<div class="results-header">Upcoming Releases for ${labelName}</div>`;
                        
                        records.forEach(record => {
                            // Pass 'false' so the label lists are collapsed by default
                            html += buildRecordCard(record, false);
                        });
                        
                        resultDiv.innerHTML = html;
                    } else {
                        resultDiv.innerHTML = `<p style="color:#B71C1C; text-align:center; margin-top:10px;">No other releases found for ${labelName}.</p>`;
                    }
                }
            });
        }

        // Updated Helper function using <details> and <summary>
        function buildRecordCard(record, isExpanded) {
            // If isExpanded is true, add the 'open' attribute
            let openAttr = isExpanded ? 'open' : '';
            let html = `<details class="record-card" ${openAttr}>`;
            
            let upc = record['UPC'] || 'N/A';
            let artist = record['Artist'] || 'N/A';
            let title = record['Title'] || 'N/A';
            
            // The clickable collapsed state
            html += `<summary class="record-summary">${upc} / ${artist} / ${title}</summary>`;
            
            // The expanded content
            html += `<div class="record-expanded-content">`;
            
            // We keep UPC, Artist, Title inside the expanded view for easy copying
            html += `<p><strong>UPC:</strong> ${upc}</p>`;
            html += `<p><strong>Artist:</strong> ${artist}</p>`;
            html += `<p><strong>Title:</strong> ${title}</p>`;
            html += `<p><strong>Release Date:</strong> ${record['Release Date'] || 'N/A'}</p>`;
            
            if (record['Label']) {
                let safeLabel = record['Label'].replace(/'/g, "\\'");
                html += `<p><strong>Label:</strong> <a href="#" onclick="searchLabel('${safeLabel}'); return false;" class="label-link" title="Click to view all releases for this label">${record['Label']}</a></p>`;
            } else {
                html += `<p><strong>Label:</strong> N/A</p>`;
            }
            
            html += `<p><strong>Partners:</strong> ${record['Partners'] || 'N/A'}</p>`;
            html += '<hr>';

            // Format Spotify
            if (record['Spotify']) {
                let spotifyUri = record['Spotify'];
                let spotifyUrl = spotifyUri;
                if (spotifyUri.startsWith('spotify:')) {
                    spotifyUrl = spotifyUri.replace('spotify:', 'https://open.spotify.com/').replace(/:/g, '/');
                }
                html += `<p><strong>Spotify Album URI:</strong> ${spotifyUri}</p>`;
                html += `<p><strong>Spotify:</strong> <a href="${spotifyUrl}" target="_blank">Pre-release link</a></p>`;
            }

            // Format Apple
            if (record['Apple']) {
                let appleId = record['Apple'];
                let appleUrl = appleId;
                if (!appleId.startsWith('http')) {
                    appleUrl = `https://music.apple.com/gb/album/${appleId}`;
                } else {
                    appleId = appleId.split('/').pop();
                }
                html += `<p><strong>Apple Album ID:</strong> ${appleId}</p>`;
                html += `<p><strong>Apple:</strong> <a href="${appleUrl}" target="_blank">Pre-release link</a></p>`;
            }

            // Format YouTube
            if (record['YouTube']) {
                html += `<p><strong>YouTube:</strong> <a href="${record['YouTube']}" target="_blank">Pre-release link</a></p>`;
            }

            // Format Amazon
            if (record['Amazon']) {
                let amazonUrl = record['Amazon'];
                let asin = "";
                if (amazonUrl.includes('/dp/')) {
                    asin = amazonUrl.split('/dp/')[1].split('/')[0];
                } else {
                    asin = amazonUrl.split('/').pop();
                }
                html += `<p><strong>Amazon Album ASIN:</strong> ${asin}</p>`;
                html += `<p><strong>Amazon:</strong> <a href="${amazonUrl}" target="_blank">Pre-release link</a></p>`;
            }

            // Format Beatport
            if (record['Beatport']) {
                html += `<p><strong>Beatport:</strong> <a href="${record['Beatport']}" target="_blank">Pre-release link</a></p>`;
            }

            if (record['WARNINGS']) {
                html += '<hr>'; 
                html += `<p style="color:#B71C1C;"><strong>Warnings:</strong> ${record['WARNINGS']}</p>`;
            }
            
            html += '</div></details>';
            return html;
        }
    </script>
</body>
</html>
